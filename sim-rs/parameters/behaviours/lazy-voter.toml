# Self-contained behaviour-tree config: always abstain from CIP-0164 votes.
# Referenced from a sim parameter file's `consensus-behaviours` and assigned to
# the selected nodes. The lazy-voter leaf sets leios.vote = Abstain(declined)
# every slot, so an assigned node never casts a vote.
[run]
name = "lazy-voter"
seed = 0
root = "lazy"

[behaviours.lazy]
type = "Action"
spec = { kind = "lazy-voter", reason = "declined" }
